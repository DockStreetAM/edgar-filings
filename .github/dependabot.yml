version: 2
updates:
  # Keep GitHub Actions current — particularly important because
  # astral-sh/setup-uv ships immutable-only tags from v8.0.0, so we'd
  # otherwise miss patch bumps silently.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      actions:
        patterns: ["*"]
    open-pull-requests-limit: 5

  # Python deps via uv.lock. `pip` covers PEP 621 / pyproject groups too.
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      python-runtime:
        dependency-type: "production"
      python-dev:
        dependency-type: "development"
    open-pull-requests-limit: 5
